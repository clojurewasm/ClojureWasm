# Per-namespace Clojure compatibility tier.
# Source of truth for ROADMAP §6 / .claude/rules/compat_tiers.md.
#
# Tier definitions:
#   A — Full semantic compat. Upstream tests must pass as-is.
#   B — Same names/shapes; v2-native impl. Observable behaviour matches.
#   C — Best-effort, documented gaps.
#   D — Not provided. Throws UnsupportedException.
#
# Add or move a tier only via an ADR (.dev/decisions/NNNN-promote-X.md).
# Phase column = the phase by which the namespace must reach the listed tier.

# Clojure core / standard library --------------------------------------------
clojure.core:           { tier: A, phase: 14 }
clojure.string:         { tier: A, phase: 10 }
clojure.set:            { tier: A, phase: 10 }
clojure.walk:           { tier: A, phase: 10 }
clojure.zip:            { tier: A, phase: 10 }
clojure.edn:            { tier: A, phase: 10 }
clojure.test:           { tier: A, phase: 11 }
clojure.pprint:         { tier: B, phase: 14 }
clojure.spec.alpha:     { tier: B, phase: 14 }    # core ops; fdef/instrument start at C
clojure.core.async:     { tier: C, phase: 15 }    # go macro becomes thread fallback
clojure.tools.cli:      { tier: A, phase: 14 }
clojure.java.io:        { tier: B, phase: 14 }    # same names, Zig-native I/O backing
clojure.java.shell:     { tier: B, phase: 14 }
clojure.data.json:      { tier: A, phase: 14 }

# Java classes (Tier D by default, raised case-by-case) ----------------------
java.lang.String:       { tier: D, phase: -  }    # use Clojure string instead
java.util.Date:         { tier: B, phase: 14 }    # provided via #inst
java.io.File:           { tier: B, phase: 14 }    # via clojure.java.io
java.util.UUID:         { tier: B, phase: 14 }
java.util.regex:        { tier: A, phase: 14 }    # Tier-A custom regex engine

# Third-party (added per ADR; empty at bootstrap) ----------------------------
# malli:                 { tier: B, phase: ?? }
# hiccup:                { tier: A, phase: ?? }
# honeysql:              { tier: A, phase: ?? }
